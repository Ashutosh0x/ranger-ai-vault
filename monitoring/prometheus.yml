global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: 'signal-engine'
    static_configs:
      - targets: ['signal-engine:8000']
    metrics_path: '/metrics'
    scrape_interval: 10s

  - job_name: 'keeper'
    static_configs:
      - targets: ['keeper:3001']
    metrics_path: '/metrics'
    scrape_interval: 30s

  - job_name: 'nginx'
    static_configs:
      - targets: ['nginx:80']
    metrics_path: '/nginx_status'

  - job_name: 'redis'
    static_configs:
      - targets: ['redis:6379']
