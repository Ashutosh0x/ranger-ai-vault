events {
    worker_connections 1024;
}

http {
    upstream signal_engine {
        server signal-engine:8080;
    }

    upstream dashboard {
        server dashboard:3000;
    }

    # Rate limiting
    limit_req_zone $binary_remote_addr zone=api:10m rate=30r/m;
    limit_req_zone $binary_remote_addr zone=general:10m rate=100r/m;

    server {
        listen 80;
        server_name _;

        # ─────────────────────────────────────────────────────────
        # C6: TLS Termination
        # TLS is handled at the infrastructure level (e.g., AWS ALB,
        # Cloudflare, or certbot on the host). This nginx instance
        # runs INSIDE Docker behind a TLS-terminating reverse proxy.
        #
        # For direct TLS on this nginx instance:
        #   1. Mount certs: ./nginx/ssl/cert.pem and key.pem
        #   2. Uncomment the lines below
        #   3. Redirect port 80 -> 443
        #
        # listen 443 ssl;
        # ssl_certificate /etc/nginx/ssl/cert.pem;
        # ssl_certificate_key /etc/nginx/ssl/key.pem;
        # ssl_protocols TLSv1.2 TLSv1.3;
        # ssl_ciphers HIGH:!aNULL:!MD5;
        # ssl_prefer_server_ciphers on;
        #
        # # Redirect HTTP to HTTPS
        # if ($scheme = http) {
        #     return 301 https://$server_name$request_uri;
        # }
        # ─────────────────────────────────────────────────────────

        # Dashboard (frontend)
        location / {
            proxy_pass http://dashboard;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            limit_req zone=general burst=20 nodelay;
        }

        # Signal API
        location /api/signal {
            proxy_pass http://signal_engine;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            limit_req zone=api burst=10 nodelay;
        }

        location /health {
            proxy_pass http://signal_engine/health;
            proxy_set_header Host $host;
        }

        # WebSocket support
        location /ws {
            proxy_pass http://signal_engine;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
        }

        # Security headers
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-XSS-Protection "1; mode=block" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    }
}
