# ===============================================================================
# Scorecard Supply-Chain Security (Lightweight Wrapper)
# ===============================================================================
# Delegates to security-audit.yml Layer 8 (OSSF Scorecard).
# This standalone wrapper ensures scorecard runs even if the audit
# pipeline is modified or disabled. Staggered schedule (06:00 UTC)
# avoids overlap with the main audit pipeline (00:00 UTC).

name: Scorecard supply-chain security

on:
  push:
    branches: [ "main" ]
  schedule:
    - cron: '0 6 * * 1'

permissions:
  contents: read
  security-events: write
  actions: read
  pull-requests: write
  id-token: write

jobs:
  # Delegate to the comprehensive security audit pipeline
  security-audit:
    name: "Full Security Audit (includes Scorecard L8)"
    uses: ./.github/workflows/security-audit.yml
    secrets: inherit
