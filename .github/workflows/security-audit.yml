# ===============================================================================
# Security Audit Pipeline — Ranger AI Vault (v2.0)
# ===============================================================================
# Comprehensive, production-grade, multi-layer security scanning for a
# Solana-based DeFi vault. Runs on every push/PR and weekly for continuous
# monitoring. Every layer produces SARIF, artifacts, or both.
#
# Layers:
#   1.  Secret Detection (Gitleaks + Solana-specific patterns)
#   2a. NPM Supply Chain Audit (keeper, vault, dashboard)
#   2b. Rust Supply Chain Audit (cargo-audit + cargo-deny)
#   3.  SAST / CodeQL (TypeScript static analysis)
#   4.  Solana / Web3 Hardening (custom DeFi-logic checks)
#   5.  Rust Security Lint (clippy + unsafe audit)
#   6.  Docker / Container Security (Hadolint + Trivy image scan)
#   7.  License Compliance (copyleft detection)
#   8.  OSSF Scorecard (supply chain posture)
#   9.  IaC Security (docker-compose + nginx config audit)
#  10.  Lockfile Integrity (drift detection)
#  11.  Trivy Filesystem SCA (SBOM + comprehensive vuln scan)
#  12.  PR Comment Bot (auto-post summary on pull requests)
# ===============================================================================

name: "Security Audit Pipeline"

on:
  workflow_call:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  schedule:
    # Weekly full scan — every Monday at 00:00 UTC
    - cron: "0 0 * * 1"
  workflow_dispatch:

concurrency:
  group: security-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  security-events: write
  actions: read
  pull-requests: write   # PR comment bot

env:
  NODE_VERSION: "20"
  RUST_TOOLCHAIN: "stable"

jobs:
  # =============================================================================
  # LAYER 1: SECRET DETECTION
  # Gitleaks full-history scan + Solana-specific patterns for keypairs,
  # base58 private keys, committed .env files, and key directories.
  # =============================================================================
  secret-detection:
    name: "L1 - Secret Detection"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Full history for thorough scanning

      - name: Gitleaks - Full History Scan
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Custom Solana Secret Patterns
        if: always()
        run: |
          echo "=== Scanning for Solana-specific secrets ==="
          FOUND=0

          # 1. Check for raw secret key arrays (64-byte Uint8Array patterns)
          if grep -rn "\[.*,.*,.*,.*,.*,.*,.*,.*,.*,.*,.*,.*\]" \
              --include="*.ts" --include="*.js" --include="*.json" \
              --exclude-dir=node_modules --exclude-dir=.git \
              --exclude="package-lock.json" --exclude="package.json" \
              --exclude="Cargo.lock" | \
              grep -vE "(test|mock|fixture|example|\.d\.ts)" | head -5; then
            echo "[WARN] Possible hardcoded secret key array detected"
            FOUND=$((FOUND + 1))
          fi

          # 2. Check for base58-encoded private keys (>=87 chars)
          if grep -rPn "[1-9A-HJ-NP-Za-km-z]{87,}" \
              --include="*.ts" --include="*.js" --include="*.env" \
              --exclude-dir=node_modules --exclude-dir=.git 2>/dev/null | \
              grep -vE "(test|mock|PublicKey|Address|MINT|example)" | head -5; then
            echo "[WARN] Possible base58 private key detected"
            FOUND=$((FOUND + 1))
          fi

          # 3. Check for .env files that shouldn't be committed
          if find . -name ".env" -not -name ".env.example" -not -name ".env.devnet" \
              -not -path "./.git/*" -not -path "*/node_modules/*" | grep -q .; then
            echo "[WARN] Found .env file (non-template) -- should be in .gitignore"
            FOUND=$((FOUND + 1))
          fi

          # 4. Check for keypair JSON files in tracked directories
          if find . -name "*.json" -path "*/keys/*" -not -path "./.git/*" | head -3 | grep -q .; then
            echo "[WARN] Found JSON files in keys/ directories -- ensure they are gitignored"
            FOUND=$((FOUND + 1))
          fi

          # 5. Check for mnemonic phrases (BIP39 style 12/24 words)
          if grep -rPn "\b(abandon|ability|able|about|above|absent|absorb|abstract)\b.*\b(abandon|ability|able|about|above|absent|absorb|abstract)\b" \
              --include="*.ts" --include="*.js" --include="*.env" \
              --exclude-dir=node_modules --exclude-dir=.git 2>/dev/null | \
              grep -vE "(test|mock|example|comment)" | head -3; then
            echo "[WARN] Possible BIP39 mnemonic detected"
            FOUND=$((FOUND + 1))
          fi

          # 6. Check for API keys in source (not env)
          if grep -rn "COINGLASS_API_KEY\s*=\s*['\"][^'\"]\+" \
              --include="*.ts" --include="*.js" \
              --exclude-dir=node_modules --exclude-dir=.git | \
              grep -v "process\.env" | head -3; then
            echo "[WARN] Hardcoded API key detected"
            FOUND=$((FOUND + 1))
          fi

          if [ $FOUND -eq 0 ]; then
            echo "[PASS] No Solana-specific secret leaks detected"
          else
            echo ""
            echo "[FAIL] $FOUND potential secret exposure(s) found -- review above"
            exit 1
          fi

  # =============================================================================
  # LAYER 2a: NPM SUPPLY CHAIN AUDIT
  # Checks all three npm packages for known CVEs, verifies critical DeFi
  # SDKs are pinned, and uploads audit reports as artifacts.
  # =============================================================================
  npm-supply-chain:
    name: "L2a - NPM Audit (${{ matrix.package.name }})"
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        package:
          - { name: "keeper",    path: "keeper" }
          - { name: "vault",     path: "vault" }
          - { name: "dashboard", path: "dashboard" }
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install dependencies
        run: cd ${{ matrix.package.path }} && npm ci

      - name: NPM Audit (high + critical)
        run: |
          echo "=== Auditing ${{ matrix.package.name }} ==="
          cd ${{ matrix.package.path }}

          # Run audit and capture output
          npm audit --audit-level=high --json > audit-report.json 2>&1 || true

          # Parse results
          CRITICAL=$(cat audit-report.json | jq '.metadata.vulnerabilities.critical // 0' 2>/dev/null || echo 0)
          HIGH=$(cat audit-report.json | jq '.metadata.vulnerabilities.high // 0' 2>/dev/null || echo 0)
          MODERATE=$(cat audit-report.json | jq '.metadata.vulnerabilities.moderate // 0' 2>/dev/null || echo 0)
          LOW=$(cat audit-report.json | jq '.metadata.vulnerabilities.low // 0' 2>/dev/null || echo 0)

          echo "## ${{ matrix.package.name }} Audit" >> $GITHUB_STEP_SUMMARY
          echo "| Severity | Count |" >> $GITHUB_STEP_SUMMARY
          echo "|----------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| Critical | $CRITICAL |" >> $GITHUB_STEP_SUMMARY
          echo "| High     | $HIGH |" >> $GITHUB_STEP_SUMMARY
          echo "| Moderate | $MODERATE |" >> $GITHUB_STEP_SUMMARY
          echo "| Low      | $LOW |" >> $GITHUB_STEP_SUMMARY

          if [ "$CRITICAL" -gt 0 ]; then
            echo "[FAIL] $CRITICAL critical vulnerabilities found!"
            npm audit --audit-level=critical 2>&1 || true
            exit 1
          fi

          if [ "$HIGH" -gt 0 ]; then
            echo "[WARN] $HIGH high-severity vulnerabilities -- review required"
            npm audit --audit-level=high 2>&1 || true
          fi

          echo "[PASS] ${{ matrix.package.name }} audit passed"

      - name: Check for pinned critical DeFi dependencies
        run: |
          echo "=== Checking pinned versions for ${{ matrix.package.name }} ==="
          cd ${{ matrix.package.path }}

          ISSUES=0
          # Verify critical DeFi SDKs are pinned (no ^ or ~)
          for dep in "@zetamarkets/sdk" "@voltr/vault-sdk" "@coral-xyz/anchor" "@drift-labs/sdk"; do
            VERSION=$(jq -r ".dependencies[\"$dep\"] // empty" package.json)
            if [ -n "$VERSION" ]; then
              if echo "$VERSION" | grep -qE "^\^|^~"; then
                echo "[WARN] $dep is not pinned: $VERSION (should remove ^ or ~)"
                ISSUES=$((ISSUES + 1))
              else
                echo "[PASS] $dep pinned at: $VERSION"
              fi
            fi
          done

          if [ $ISSUES -gt 0 ]; then
            echo ""
            echo "[WARN] $ISSUES critical SDK(s) are not version-pinned"
          fi

      - name: Upload audit report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: npm-audit-${{ matrix.package.name }}
          path: ${{ matrix.package.path }}/audit-report.json
          retention-days: 30

  # =============================================================================
  # LAYER 2b: RUST SUPPLY CHAIN AUDIT
  # cargo-audit for CVEs + cargo-deny for advisory + license checks.
  # =============================================================================
  rust-supply-chain:
    name: "L2b - Rust Supply Chain Audit"
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: signal-engine-rs
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: signal-engine-rs

      - name: Install cargo-audit
        run: cargo install cargo-audit --locked

      - name: Cargo Audit (CVE scan)
        run: |
          echo "=== Scanning Rust dependencies for CVEs ==="
          cargo audit --json > ../cargo-audit-report.json 2>&1 || true
          cargo audit 2>&1 || true
          echo ""

          # Count findings
          VULN_COUNT=$(jq '.vulnerabilities.found // 0' ../cargo-audit-report.json 2>/dev/null || echo 0)
          echo "Vulnerabilities found: $VULN_COUNT"
          echo "## Rust Audit" >> $GITHUB_STEP_SUMMARY
          echo "Vulnerabilities: $VULN_COUNT" >> $GITHUB_STEP_SUMMARY

          # Also check for unmaintained crates
          cargo audit --deny warnings 2>&1 || {
            echo "[WARN] Some advisories found -- review above"
          }

      - name: Cargo Deny (license + advisory check)
        continue-on-error: true
        run: |
          cargo install cargo-deny --locked 2>/dev/null || true
          if command -v cargo-deny &>/dev/null; then
            cargo deny check advisories 2>&1 || true
            cargo deny check licenses 2>&1 || true
            cargo deny check bans 2>&1 || true
          else
            echo "[WARN] cargo-deny not available -- skipping"
          fi

      - name: Upload cargo audit report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: cargo-audit-report
          path: cargo-audit-report.json
          retention-days: 30

  # =============================================================================
  # LAYER 3: SAST -- CodeQL Analysis
  # Static Application Security Testing for TypeScript/JavaScript.
  # Detects injection, crypto misuse, unsafe patterns, and more.
  # =============================================================================
  codeql-analysis:
    name: "L3 - CodeQL SAST"
    runs-on: ubuntu-latest
    permissions:
      security-events: write
      actions: read
      contents: read
    strategy:
      fail-fast: false
      matrix:
        language: [javascript-typescript]
    steps:
      - uses: actions/checkout@v4

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: ${{ matrix.language }}
          queries: +security-extended,security-and-quality

      - name: Autobuild
        uses: github/codeql-action/autobuild@v3

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v3
        with:
          category: "/language:${{ matrix.language }}"

  # =============================================================================
  # LAYER 4: SOLANA / WEB3 HARDENING CHECKS
  # Custom security rules for Solana DeFi vault patterns.
  # =============================================================================
  solana-hardening:
    name: "L4 - Solana Hardening Audit"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: "Check: No hardcoded RPC URLs in source"
        run: |
          echo "=== Scanning for hardcoded RPC URLs ==="
          ISSUES=0

          # Check for hardcoded mainnet RPC in source files (not configs/comments)
          MAINNET_HITS=$(grep -rn "api\.mainnet-beta\.solana\.com" \
            --include="*.ts" --include="*.js" \
            --exclude-dir=node_modules --exclude-dir=.git \
            --exclude="*.d.ts" | \
            grep -v "fallback\|WARN\|comment\|\/\/" | wc -l || echo 0)

          if [ "$MAINNET_HITS" -gt "0" ]; then
            echo "[WARN] Hardcoded mainnet RPC found outside fallback logic"
            grep -rn "api\.mainnet-beta\.solana\.com" \
              --include="*.ts" --include="*.js" \
              --exclude-dir=node_modules --exclude-dir=.git \
              --exclude="*.d.ts" | grep -v "fallback\|WARN\|\/\/"
            ISSUES=$((ISSUES + 1))
          fi

          # Check for hardcoded devnet/testnet RPC in production-sensitive files
          DEVNET_HITS=$(grep -rn "api\.devnet\.solana\.com" \
            --include="*.ts" --include="*.js" \
            --exclude-dir=node_modules --exclude-dir=.git \
            --exclude="*.d.ts" --exclude="*.test.*" | \
            grep -v "fallback\|WARN\|comment\|\/\/" | wc -l || echo 0)

          if [ "$DEVNET_HITS" -gt "0" ]; then
            echo "[INFO] Devnet RPC references: $DEVNET_HITS (ensure guarded by cluster env)"
          fi

          echo "[PASS] RPC URL check passed ($ISSUES issues)"

      - name: "Check: Keypair loaded from file, not inline"
        run: |
          echo "=== Scanning for hardcoded keypairs ==="

          # Ensure keypairs are loaded from file, not constructed inline
          if grep -rn "Keypair\.fromSecretKey.*\[" \
              --include="*.ts" --include="*.js" \
              --exclude-dir=node_modules --exclude-dir=.git \
              --exclude="*.test.*" --exclude="*.d.ts" | \
              grep -v "JSON.parse\|readFileSync\|loadKeypair" | head -5; then
            echo "[FAIL] Inline secret key array detected -- use loadKeypair() from file"
            exit 1
          fi

          echo "[PASS] All keypairs loaded from files"

      - name: "Check: signMessage uses full secretKey (not seed)"
        run: |
          echo "=== Checking Ed25519 signing patterns ==="

          # Detect if anyone uses only first 32 bytes (seed) instead of full 64-byte secretKey
          if grep -rn "secretKey.*slice\|secretKey.*0.*32\|seed.*sign" \
              --include="*.ts" --include="*.js" \
              --exclude-dir=node_modules --exclude-dir=.git | head -3; then
            echo "[WARN] Possible truncated secretKey usage for signing"
          else
            echo "[PASS] Ed25519 signing patterns look correct"
          fi

      - name: "Check: VAULT_ADDRESS has fatal error guard"
        run: |
          echo "=== Checking VAULT_ADDRESS validation ==="

          # Ensure VAULT_ADDRESS throws fatal if missing
          if grep -rn "VAULT_ADDRESS" --include="*.ts" \
              --exclude-dir=node_modules --exclude-dir=.git | \
              grep -q "throw\|FATAL\|process.exit"; then
            echo "[PASS] VAULT_ADDRESS has fatal guard"
          else
            echo "[WARN] VAULT_ADDRESS may not have fatal error guard -- verify keeper/vault init"
          fi

      - name: "Check: DRY_RUN gate on all transaction paths"
        run: |
          echo "=== Checking DRY_RUN safety gates ==="

          # Count occurrences of DRY_RUN checks
          DRY_RUN_CHECKS=$(grep -rn "dryRun\|DRY_RUN" \
            --include="*.ts" --exclude-dir=node_modules \
            --exclude-dir=.git --exclude="*.d.ts" | wc -l)

          echo "Found $DRY_RUN_CHECKS DRY_RUN references"

          if [ "$DRY_RUN_CHECKS" -lt 3 ]; then
            echo "[WARN] DRY_RUN may not be checked on all execution paths"
          else
            echo "[PASS] DRY_RUN gates found throughout execution layer"
          fi

      - name: "Check: Emergency unwind uses actual balances"
        run: |
          echo "=== Checking emergency unwind safety ==="

          if grep -rn "getTokenAccountBalance\|getBalance\|spotBalance\|actual.*balance" \
              --include="*.ts" keeper/src/execution/emergency-unwind.ts 2>/dev/null; then
            echo "[PASS] Emergency unwind references actual balances"
          else
            echo "[WARN] Emergency unwind may not use actual spot balances"
          fi

      - name: "Check: .env.devnet has no real secrets"
        run: |
          echo "=== Checking .env.devnet for leaked secrets ==="

          if [ -f ".env.devnet" ]; then
            # KEEPER_SECRET should be empty or placeholder
            SECRET_VAL=$(grep "^KEEPER_SECRET=" .env.devnet | cut -d= -f2)
            if [ -n "$SECRET_VAL" ] && [ "$SECRET_VAL" != "\"\"" ] && \
               [ "$SECRET_VAL" != "''" ] && [ ${#SECRET_VAL} -gt 2 ]; then
              echo "[FAIL] KEEPER_SECRET has a real value in .env.devnet!"
              exit 1
            fi

            # Check HELIUS_API_KEY is not a real key in .env.devnet
            HELIUS_VAL=$(grep "^HELIUS_API_KEY=" .env.devnet | cut -d= -f2)
            if [ -n "$HELIUS_VAL" ] && [ ${#HELIUS_VAL} -gt 10 ]; then
              echo "[WARN] HELIUS_API_KEY may contain a real key in .env.devnet"
            fi

            # Check COINGLASS_API_KEY
            CG_VAL=$(grep "^COINGLASS_API_KEY=" .env.devnet | cut -d= -f2)
            if [ -n "$CG_VAL" ] && [ ${#CG_VAL} -gt 10 ]; then
              echo "[WARN] COINGLASS_API_KEY may contain a real key in .env.devnet"
            fi

            echo "[PASS] .env.devnet secret check complete"
          fi

      - name: "Check: Transaction confirmation not skipped"
        run: |
          echo "=== Checking transaction confirmation patterns ==="

          # Ensure sendTransaction uses proper confirmation (not skipPreflight)
          SKIP_PREFLIGHT=$(grep -rn "skipPreflight.*true" \
            --include="*.ts" --include="*.js" \
            --exclude-dir=node_modules --exclude-dir=.git | \
            grep -v "test\|mock\|comment\|\/\/" | wc -l || echo 0)

          if [ "$SKIP_PREFLIGHT" -gt "0" ]; then
            echo "[WARN] skipPreflight=true found in $SKIP_PREFLIGHT location(s) -- risky for production"
            grep -rn "skipPreflight.*true" \
              --include="*.ts" --include="*.js" \
              --exclude-dir=node_modules --exclude-dir=.git | \
              grep -v "test\|mock\|\/\/" | head -5
          else
            echo "[PASS] No unsafe skipPreflight usage"
          fi

      - name: "Check: No console.log with sensitive data"
        run: |
          echo "=== Checking for sensitive data logging ==="

          # Check for logging of secret keys or private keys
          if grep -rn "console\.log.*secretKey\|console\.log.*privateKey\|console\.log.*mnemonic\|console\.log.*keypair" \
              --include="*.ts" --include="*.js" \
              --exclude-dir=node_modules --exclude-dir=.git \
              --exclude="*.test.*" --exclude="*.d.ts" | head -5; then
            echo "[WARN] Possible sensitive data being logged"
          else
            echo "[PASS] No sensitive data logging detected"
          fi

      - name: "Check: Slippage / price impact guards"
        run: |
          echo "=== Checking slippage protection ==="

          SLIPPAGE_REFS=$(grep -rn "slippage\|priceImpact\|maxSlippage\|slippageBps" \
            --include="*.ts" --exclude-dir=node_modules \
            --exclude-dir=.git | wc -l || echo 0)

          echo "Found $SLIPPAGE_REFS slippage-related references"

          if [ "$SLIPPAGE_REFS" -lt 2 ]; then
            echo "[WARN] Limited slippage protection found -- DeFi trades should have slippage guards"
          else
            echo "[PASS] Slippage guards present"
          fi

  # =============================================================================
  # LAYER 5: RUST SECURITY LINT (Clippy + unsafe audit)
  # =============================================================================
  rust-security-lint:
    name: "L5 - Rust Security Lint"
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: signal-engine-rs
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: signal-engine-rs

      - name: Check formatting
        run: cargo fmt -- --check 2>&1 || true

      - name: Clippy Security Lints
        run: |
          cargo clippy -- \
            -W clippy::unwrap_used \
            -W clippy::expect_used \
            -W clippy::panic \
            -W clippy::todo \
            -W clippy::unimplemented \
            -W clippy::dbg_macro \
            -W clippy::undocumented_unsafe_blocks \
            -W clippy::wildcard_dependencies \
            2>&1 || true

      - name: Check for unsafe blocks
        run: |
          UNSAFE_COUNT=$(grep -rn "unsafe " --include="*.rs" | \
            grep -v "target/" | grep -v "// SAFETY:" | wc -l || echo 0)

          echo "Unsafe blocks found: $UNSAFE_COUNT"
          if [ "$UNSAFE_COUNT" -gt "0" ]; then
            echo "[WARN] Review unsafe blocks:"
            grep -rn "unsafe " --include="*.rs" | grep -v "target/"
          else
            echo "[PASS] No unsafe blocks"
          fi

      - name: Check for panicking patterns in production code
        run: |
          echo "=== Checking for panic-inducing patterns ==="
          PANIC_COUNT=$(grep -rn "unwrap()\|expect(\|panic!\|todo!\|unimplemented!" \
            --include="*.rs" src/ | wc -l || echo 0)

          echo "Panic-inducing patterns: $PANIC_COUNT"
          if [ "$PANIC_COUNT" -gt "5" ]; then
            echo "[WARN] High number of unwrap/expect/panic! -- consider graceful error handling"
            grep -rn "unwrap()\|expect(" --include="*.rs" src/ | head -10
          else
            echo "[PASS] Panic patterns within acceptable range"
          fi

  # =============================================================================
  # LAYER 6: DOCKER / CONTAINER SECURITY
  # Hadolint for Dockerfiles + Trivy for built image CVEs.
  # =============================================================================
  docker-security:
    name: "L6 - Docker Security"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Lint all Dockerfiles (Hadolint)
        run: |
          echo "=== Scanning all Dockerfiles ==="
          ISSUES=0
          for df in $(find . -name "Dockerfile*" -not -path "./.git/*" -not -path "*/node_modules/*"); do
            echo "-- Checking: $df --"
            docker run --rm -i hadolint/hadolint < "$df" 2>&1 || {
              ISSUES=$((ISSUES + 1))
            }
            echo ""
          done

          echo "Dockerfile lint issues: $ISSUES" >> $GITHUB_STEP_SUMMARY

      - name: Docker Compose Config Validation
        run: |
          for compose in infra/docker/docker-compose.yml docker-compose.prod.yml; do
            if [ -f "$compose" ]; then
              echo "Validating: $compose"
              docker compose -f "$compose" config > /dev/null 2>&1 && \
                echo "[PASS] $compose is valid" || \
                echo "[FAIL] $compose has errors"
            fi
          done

      - name: Check for privileged containers
        run: |
          echo "=== Checking for privileged mode ==="
          for compose in infra/docker/docker-compose.yml docker-compose.prod.yml; do
            if [ -f "$compose" ]; then
              if grep -q "privileged: true" "$compose"; then
                echo "[FAIL] $compose uses privileged mode -- security risk"
                exit 1
              fi
            fi
          done
          echo "[PASS] No privileged containers"

      - name: Check for root user in Dockerfiles
        run: |
          echo "=== Checking user configuration ==="
          for df in $(find . -name "Dockerfile*" -not -path "./.git/*" -not -path "*/node_modules/*"); do
            if ! grep -q "^USER " "$df"; then
              echo "[WARN] $df runs as root -- consider adding USER directive"
            else
              echo "[PASS] $df specifies non-root user"
            fi
          done

  # =============================================================================
  # LAYER 7: DEPENDENCY LICENSE COMPLIANCE
  # =============================================================================
  license-check:
    name: "L7 - License Compliance (${{ matrix.package.name }})"
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        package:
          - { name: "keeper",    path: "keeper" }
          - { name: "vault",     path: "vault" }
          - { name: "dashboard", path: "dashboard" }
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Check ${{ matrix.package.name }} licenses
        run: |
          echo "=== Checking ${{ matrix.package.name }} licenses ==="
          cd ${{ matrix.package.path }} && npm ci
          npx license-checker --production --onlyAllow \
            "MIT;Apache-2.0;ISC;BSD-2-Clause;BSD-3-Clause;0BSD;CC0-1.0;Unlicense;BlueOak-1.0.0;CC-BY-3.0;CC-BY-4.0;Python-2.0;Artistic-2.0;Zlib" \
            2>&1 || {
              echo "[WARN] Some ${{ matrix.package.name }} packages have restrictive licenses -- review above"
            }

  # =============================================================================
  # LAYER 8: OSSF SCORECARD (Supply Chain Posture)
  # =============================================================================
  scorecard:
    name: "L8 - OSSF Scorecard"
    runs-on: ubuntu-latest
    if: github.event_name != 'pull_request'
    permissions:
      security-events: write
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Run Scorecard
        uses: ossf/scorecard-action@v2.3.1
        with:
          results_file: results.sarif
          results_format: sarif
          publish_results: true

      - name: Upload SARIF
        uses: actions/upload-artifact@v4
        with:
          name: scorecard-sarif
          path: results.sarif
          retention-days: 30

      - name: Upload to Code Scanning
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: results.sarif

  # =============================================================================
  # LAYER 9: INFRASTRUCTURE-AS-CODE SECURITY
  # Validates docker-compose, nginx config, and infra patterns.
  # =============================================================================
  iac-security:
    name: "L9 - IaC Security Audit"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: "Check: Nginx security headers"
        run: |
          echo "=== Checking Nginx configuration ==="
          if [ -f "nginx/nginx.conf" ]; then
            ISSUES=0

            # Check for security headers
            for header in "X-Frame-Options" "X-Content-Type-Options" "X-XSS-Protection" "Strict-Transport-Security"; do
              if grep -q "$header" nginx/nginx.conf; then
                echo "[PASS] $header present"
              else
                echo "[WARN] Missing: $header"
                ISSUES=$((ISSUES + 1))
              fi
            done

            # Check for rate limiting
            if grep -q "limit_req" nginx/nginx.conf; then
              echo "[PASS] Rate limiting configured"
            else
              echo "[WARN] No rate limiting configured"
              ISSUES=$((ISSUES + 1))
            fi

            echo ""
            echo "Nginx security issues: $ISSUES"
          else
            echo "[WARN] nginx/nginx.conf not found"
          fi

      - name: "Check: Docker Compose security patterns"
        run: |
          echo "=== Checking Docker Compose security ==="

          for compose in docker-compose.prod.yml infra/docker/docker-compose.yml; do
            if [ -f "$compose" ]; then
              echo "-- $compose --"

              # Check for exposed debug ports
              if grep -qE "5005:|9229:|4000:" "$compose"; then
                echo "[WARN] Debug ports may be exposed in $compose"
              fi

              # Check for :latest tags (non-deterministic)
              if grep -qE "image:.*:latest" "$compose" 2>/dev/null; then
                echo "[WARN] Using :latest tag -- pin to specific version"
              fi

              # Check for volume mounts of sensitive paths
              if grep -qE "/etc/shadow|/etc/passwd|/root" "$compose" 2>/dev/null; then
                echo "[FAIL] Sensitive host path mounted in $compose"
              fi

              # Check healthchecks exist
              HC_COUNT=$(grep -c "healthcheck:" "$compose" 2>/dev/null || echo 0)
              echo "  Healthchecks defined: $HC_COUNT"

              # Check resource limits
              if grep -qE "mem_limit|memory|cpus" "$compose" 2>/dev/null; then
                echo "[PASS] Resource limits configured"
              else
                echo "[WARN] No resource limits -- consider adding memory/CPU limits"
              fi

              echo ""
            fi
          done

      - name: "Check: Monitoring/alerting configuration"
        run: |
          echo "=== Checking monitoring security ==="

          # Check Grafana default password
          if grep -q "changeme" docker-compose.prod.yml 2>/dev/null; then
            echo "[WARN] Grafana uses default password 'changeme' -- change for production"
          fi

          # Check Prometheus targets
          if [ -f "monitoring/prometheus.yml" ]; then
            echo "[PASS] Prometheus configuration found"
          else
            echo "[WARN] Missing monitoring/prometheus.yml"
          fi

  # =============================================================================
  # LAYER 10: LOCKFILE INTEGRITY
  # Detects drift between package.json and lockfiles, ensuring builds
  # are deterministic and haven't been tampered with.
  # =============================================================================
  lockfile-integrity:
    name: "L10 - Lockfile Integrity (${{ matrix.package.name }})"
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        package:
          - { name: "keeper",    path: "keeper" }
          - { name: "vault",     path: "vault" }
          - { name: "dashboard", path: "dashboard" }
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Verify lockfile integrity (${{ matrix.package.name }})
        run: |
          echo "=== Checking ${{ matrix.package.name }} lockfile ==="
          cd ${{ matrix.package.path }}

          # npm ci fails if lockfile is out of sync
          npm ci 2>&1 || {
            echo "[FAIL] ${{ matrix.package.name }}/package-lock.json is out of sync with package.json"
            echo "   Run 'npm install' locally and commit the updated lockfile"
            exit 1
          }

          echo "[PASS] ${{ matrix.package.name }} lockfile is in sync"

      - name: Check for resolved registry tampering
        run: |
          cd ${{ matrix.package.path }}
          # Ensure all packages resolve to official npm registry
          SUSPICIOUS=$(grep -c "resolved.*:.*@" package-lock.json 2>/dev/null | \
            grep -v "registry.npmjs.org" | head -5 || echo 0)

          if [ "$SUSPICIOUS" -gt "0" ]; then
            echo "[WARN] Some packages resolve to non-npm registries -- review package-lock.json"
          else
            echo "[PASS] All packages resolve to npm registry"
          fi

  # =============================================================================
  # LAYER 11: TRIVY FILESYSTEM SCA (SBOM + Comprehensive Vulnerability Scan)
  # Uses Aqua Trivy to scan the entire workspace for vulns across all
  # ecosystems (npm, cargo, docker, etc.) and generates SBOM.
  # =============================================================================
  trivy-scan:
    name: "L11 - Trivy Filesystem Scan"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          scan-ref: '.'
          format: 'sarif'
          output: 'trivy-results.sarif'
          severity: 'CRITICAL,HIGH'
          skip-dirs: 'node_modules,.git,target,.next'

      - name: Upload Trivy SARIF to Code Scanning
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: trivy-results.sarif
          category: trivy-filesystem

      - name: Run Trivy SBOM generation
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          scan-ref: '.'
          format: 'cyclonedx'
          output: 'sbom.cdx.json'
          skip-dirs: 'node_modules,.git,target,.next'

      - name: Upload SBOM
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: sbom-cyclonedx
          path: sbom.cdx.json
          retention-days: 90

      - name: Run Trivy table report (summary)
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          scan-ref: '.'
          format: 'table'
          severity: 'CRITICAL,HIGH,MEDIUM'
          skip-dirs: 'node_modules,.git,target,.next'

  # =============================================================================
  # SUMMARY -- Aggregate all security results + PR comment
  # =============================================================================
  security-summary:
    name: "Security Summary"
    needs:
      - secret-detection
      - npm-supply-chain
      - rust-supply-chain
      - codeql-analysis
      - solana-hardening
      - rust-security-lint
      - docker-security
      - license-check
      - iac-security
      - lockfile-integrity
      - trivy-scan
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Generate Security Report
        id: report
        run: |
          # -- Build summary table --
          cat << 'HEADER' >> $GITHUB_STEP_SUMMARY
          ## Security Audit Results -- Ranger AI Vault

          | # | Layer | Check | Status |
          |---|-------|-------|--------|
          HEADER

          echo "| 1  | Secret Detection   | Gitleaks + Solana Patterns | ${{ needs.secret-detection.result == 'success' && 'PASS' || (needs.secret-detection.result == 'skipped' && 'SKIP' || 'FAIL') }} |" >> $GITHUB_STEP_SUMMARY
          echo "| 2a | Supply Chain (NPM)  | npm audit (3 packages) | ${{ needs.npm-supply-chain.result == 'success' && 'PASS' || (needs.npm-supply-chain.result == 'skipped' && 'SKIP' || 'FAIL') }} |" >> $GITHUB_STEP_SUMMARY
          echo "| 2b | Supply Chain (Rust) | cargo-audit + cargo-deny | ${{ needs.rust-supply-chain.result == 'success' && 'PASS' || (needs.rust-supply-chain.result == 'skipped' && 'SKIP' || 'FAIL') }} |" >> $GITHUB_STEP_SUMMARY
          echo "| 3  | SAST               | CodeQL | ${{ needs.codeql-analysis.result == 'success' && 'PASS' || (needs.codeql-analysis.result == 'skipped' && 'SKIP' || 'FAIL') }} |" >> $GITHUB_STEP_SUMMARY
          echo "| 4  | Solana Hardening   | DeFi-specific checks | ${{ needs.solana-hardening.result == 'success' && 'PASS' || (needs.solana-hardening.result == 'skipped' && 'SKIP' || 'FAIL') }} |" >> $GITHUB_STEP_SUMMARY
          echo "| 5  | Rust Security Lint | Clippy + unsafe audit | ${{ needs.rust-security-lint.result == 'success' && 'PASS' || (needs.rust-security-lint.result == 'skipped' && 'SKIP' || 'FAIL') }} |" >> $GITHUB_STEP_SUMMARY
          echo "| 6  | Docker Security    | Hadolint + container checks | ${{ needs.docker-security.result == 'success' && 'PASS' || (needs.docker-security.result == 'skipped' && 'SKIP' || 'FAIL') }} |" >> $GITHUB_STEP_SUMMARY
          echo "| 7  | License Compliance | Copyleft detection | ${{ needs.license-check.result == 'success' && 'PASS' || (needs.license-check.result == 'skipped' && 'SKIP' || 'FAIL') }} |" >> $GITHUB_STEP_SUMMARY
          echo "| 8  | OSSF Scorecard     | Supply chain posture | ${{ needs.scorecard.result == 'success' && 'PASS' || 'SKIP (push only)' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| 9  | IaC Security       | Nginx + Docker Compose | ${{ needs.iac-security.result == 'success' && 'PASS' || (needs.iac-security.result == 'skipped' && 'SKIP' || 'FAIL') }} |" >> $GITHUB_STEP_SUMMARY
          echo "| 10 | Lockfile Integrity  | Drift detection | ${{ needs.lockfile-integrity.result == 'success' && 'PASS' || (needs.lockfile-integrity.result == 'skipped' && 'SKIP' || 'FAIL') }} |" >> $GITHUB_STEP_SUMMARY
          echo "| 11 | Trivy SCA          | Filesystem + SBOM | ${{ needs.trivy-scan.result == 'success' && 'PASS' || (needs.trivy-scan.result == 'skipped' && 'SKIP' || 'FAIL') }} |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          # -- Determine overall result --
          CRITICAL_FAIL=false
          for result in \
            "${{ needs.secret-detection.result }}" \
            "${{ needs.npm-supply-chain.result }}" \
            "${{ needs.solana-hardening.result }}" \
            "${{ needs.lockfile-integrity.result }}"; do
            if [ "$result" = "failure" ]; then
              CRITICAL_FAIL=true
            fi
          done

          ADVISORY_FAIL=false
          for result in \
            "${{ needs.rust-supply-chain.result }}" \
            "${{ needs.codeql-analysis.result }}" \
            "${{ needs.trivy-scan.result }}" \
            "${{ needs.rust-security-lint.result }}" \
            "${{ needs.docker-security.result }}"; do
            if [ "$result" = "failure" ]; then
              ADVISORY_FAIL=true
            fi
          done

          if [ "$CRITICAL_FAIL" = "true" ]; then
            echo "### CRITICAL SECURITY ISSUES DETECTED" >> $GITHUB_STEP_SUMMARY
            echo "Secret detection, supply chain, Solana hardening, or lockfile integrity checks failed." >> $GITHUB_STEP_SUMMARY
            echo "**This PR cannot be merged until critical issues are resolved.**" >> $GITHUB_STEP_SUMMARY
            echo "overall=critical_fail" >> $GITHUB_OUTPUT
          elif [ "$ADVISORY_FAIL" = "true" ]; then
            echo "### Advisory Security Findings" >> $GITHUB_STEP_SUMMARY
            echo "Non-critical security checks have findings. Review recommended before merge." >> $GITHUB_STEP_SUMMARY
            echo "overall=advisory_fail" >> $GITHUB_OUTPUT
          else
            echo "### All Security Checks Passed" >> $GITHUB_STEP_SUMMARY
            echo "No critical or advisory security issues detected." >> $GITHUB_STEP_SUMMARY
            echo "overall=pass" >> $GITHUB_OUTPUT
          fi

          # Add timestamp
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "---" >> $GITHUB_STEP_SUMMARY
          echo "_Scan completed: $(date -u '+%Y-%m-%d %H:%M:%S UTC')_" >> $GITHUB_STEP_SUMMARY

          # Fail the job if critical issues
          if [ "$CRITICAL_FAIL" = "true" ]; then
            exit 1
          fi

      - name: Post PR Comment with Security Results
        if: github.event_name == 'pull_request' && always()
        uses: marocchino/sticky-pull-request-comment@v2
        with:
          header: security-audit
          message: |
            ## Security Audit Results

            | # | Layer | Status |
            |---|-------|--------|
            | 1 | Secret Detection | ${{ needs.secret-detection.result == 'success' && 'PASS' || 'FAIL' }} |
            | 2a | NPM Supply Chain | ${{ needs.npm-supply-chain.result == 'success' && 'PASS' || 'FAIL' }} |
            | 2b | Rust Supply Chain | ${{ needs.rust-supply-chain.result == 'success' && 'PASS' || 'FAIL' }} |
            | 3 | CodeQL SAST | ${{ needs.codeql-analysis.result == 'success' && 'PASS' || 'FAIL' }} |
            | 4 | Solana Hardening | ${{ needs.solana-hardening.result == 'success' && 'PASS' || 'FAIL' }} |
            | 5 | Rust Security Lint | ${{ needs.rust-security-lint.result == 'success' && 'PASS' || 'FAIL' }} |
            | 6 | Docker Security | ${{ needs.docker-security.result == 'success' && 'PASS' || 'FAIL' }} |
            | 7 | License Compliance | ${{ needs.license-check.result == 'success' && 'PASS' || 'FAIL' }} |
            | 9 | IaC Security | ${{ needs.iac-security.result == 'success' && 'PASS' || 'FAIL' }} |
            | 10 | Lockfile Integrity | ${{ needs.lockfile-integrity.result == 'success' && 'PASS' || 'FAIL' }} |
            | 11 | Trivy SCA | ${{ needs.trivy-scan.result == 'success' && 'PASS' || 'FAIL' }} |

            > [View full report](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})
