name: Validate Repo Structure

on:
  workflow_call:
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Validate required files exist
        run: |
          REQUIRED=(
            "README.md"
            "Makefile"
            ".env.example"
            "signal-engine-rs/Cargo.toml"
            "signal-engine-rs/src/main.rs"
            "keeper/package.json"
            "dashboard/package.json"
            "submission/strategy-doc.md"
            "docker-compose.prod.yml"
          )
          FAILED=0
          for f in "${REQUIRED[@]}"; do
            if [ ! -f "$f" ]; then
              echo "[FAIL] MISSING: $f"
              FAILED=1
            else
              echo "[PASS] EXISTS: $f"
            fi
          done

          # Optional docs — warn but don't fail
          for f in docs/ARCHITECTURE.md docs/ATTESTATION.md docs/RISK-FRAMEWORK.md docs/SIGNAL-ENGINE.md; do
            if [ -f "$f" ]; then
              echo "[PASS] EXISTS: $f"
            else
              echo "[WARN] OPTIONAL MISSING: $f"
            fi
          done

          exit $FAILED

      - name: Check no FILL_AFTER_DEPLOY placeholders remain
        run: |
          COUNT=$(grep -r "FILL_AFTER_DEPLOY" --include="*.md" --include="*.ts" --include="*.py" --include="*.rs" . | wc -l)
          if [ "$COUNT" -gt "0" ]; then
            echo "[WARN] Found $COUNT unfilled placeholders:"
            grep -r "FILL_AFTER_DEPLOY" --include="*.md" --include="*.ts" .
            echo "These must be filled before submission"
          else
            echo "[PASS] No unfilled placeholders"
          fi

      - name: Validate vault scripts count
        run: |
          COUNT=$(ls vault/src/scripts/*.ts 2>/dev/null | wc -l)
          echo "Vault scripts found: $COUNT"
          if [ "$COUNT" -lt "15" ]; then
            echo "[WARN] Expected 15+ vault scripts, found $COUNT"
          else
            echo "[PASS] All vault scripts present"
          fi

      - name: Validate signal engine (Rust) builds
        run: |
          if [ -f "signal-engine-rs/Cargo.toml" ]; then
            echo "[PASS] signal-engine-rs/Cargo.toml exists"
          else
            echo "[FAIL] signal-engine-rs/Cargo.toml missing"
            exit 1
          fi

          if [ -f "signal-engine-rs/src/main.rs" ]; then
            echo "[PASS] signal-engine-rs/src/main.rs exists"
          else
            echo "[FAIL] signal-engine-rs/src/main.rs missing"
            exit 1
          fi
