# ===============================================================================
# Security Scan (Lightweight -- delegates to security-audit)
# ===============================================================================
# This is a lightweight wrapper that triggers on main pushes and
# weekly schedule. The heavy lifting is done by security-audit.yml.
# Kept for backward compatibility with branch protection rules.

name: Security Scan

on:
  push:
    branches: [main]
  schedule:
    - cron: '0 0 * * 1'

permissions:
  contents: read
  security-events: write
  actions: read
  pull-requests: write
  id-token: write

jobs:
  # Delegate to the comprehensive security audit pipeline
  security-audit:
    name: "Full Security Audit"
    uses: ./.github/workflows/security-audit.yml
    secrets: inherit
