name: 🔒 Security Scan

on:
  push:
    branches: [main]
  schedule:
    - cron: '0 0 * * 1'

jobs:
  secret-scan:
    name: Secret Detection (Gitleaks)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run Gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  python-audit:
    name: Python Dependency Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: |
          pip install pip-audit
          cd signal-engine
          pip-audit -r requirements.txt --desc || true

  node-audit:
    name: Node.js Dependency Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: |
          cd keeper && npm ci && npm audit --audit-level=high || true
          cd ../dashboard && npm ci && npm audit --audit-level=high || true
          cd ../vault && npm ci && npm audit --audit-level=high || true
