# .github/workflows/ci-signal-engine.yml
name: "Signal Engine RS CI"

on:
  workflow_call:
  push:
    paths:
      - "signal-engine-rs/**"
      - ".github/workflows/ci-signal-engine.yml"

defaults:
  run:
    working-directory: signal-engine-rs

jobs:
  rust-tests:
    name: "Cargo Check & Tests"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Rust Cache
        uses: Swatinem/rust-cache@v2

      - name: Check formatting
        run: cargo fmt -- --check

      - name: Clippy lints
        run: cargo clippy -- -D warnings

      - name: Build
        run: cargo build --release

      - name: Run Tests
        run: cargo test
