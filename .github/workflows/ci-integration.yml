# .github/workflows/ci-integration.yml
name: "🔗 Integration Tests"

on:
  workflow_call:
  workflow_dispatch:

jobs:
  cross-package:
    name: "Cross-Package Integration"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node 18
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Set up Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install all dependencies
        run: |
          cd signal-engine && pip install -r requirements.txt && cd ..
          cd keeper && npm install && cd ..
          cd vault && npm install && cd ..

      # ═══ TEST 1: Signal Engine → Keeper Communication ═══
      - name: "Test: Signal ↔ Keeper Communication"
        env:
          KEEPER_SECRET: "integration_test_secret"
          COINGLASS_API_KEY: "test_key"
        run: |
          echo "═══ Starting signal server ═══"
          cd signal-engine
          python -m uvicorn src.signal_server:app \
            --host 0.0.0.0 --port 8080 &
          SIGNAL_PID=$!
          cd ..

          for i in $(seq 1 30); do
            curl -s http://localhost:8080/health > /dev/null 2>&1 && break
            sleep 1
          done
          echo "✅ Server started"

          echo ""
          echo "═══ Testing keeper signal client ═══"
          cd keeper
          npx ts-node -e "
          const { SignalClient } = require('./src/core/signal-client');

          async function test() {
            process.env.KEEPER_SECRET = 'integration_test_secret';
            process.env.SIGNAL_SERVER_URL = 'http://localhost:8080';

            const client = new SignalClient();

            const healthy = await client.isHealthy();
            console.log('Health check:', healthy ? '✅ OK' : '❌ FAIL');
            if (!healthy) process.exit(1);

            try {
              const signal = await client.getSignal('SOL-PERP');
              console.log('Signal response:', JSON.stringify(signal, null, 2));
              console.log('✅ Signal endpoint reachable');
            } catch (err) {
              if (err.response?.status === 500) {
                console.log('⚠️ Signal returned 500 (models not trained) — endpoint works');
              } else if (err.response?.status === 403) {
                console.log('❌ Auth failed — check KEEPER_SECRET');
                process.exit(1);
              } else {
                console.log('⚠️ Signal error:', err.message);
              }
            }

            console.log('✅ Signal ↔ Keeper communication test passed');
          }

          test().catch(err => { console.error(err); process.exit(1); });
          " 2>&1
          cd ..
          kill $SIGNAL_PID 2>/dev/null || true

      # ═══ TEST 2: Keeper Module Import Chain ═══
      - name: "Test: Keeper Full Import Chain"
        env:
          KEEPER_SECRET: "test"
          SIGNAL_SERVER_URL: "http://localhost:8080"
          HELIUS_RPC_URL: "https://api.devnet.solana.com"
          DRY_RUN: "true"
        run: |
          cd keeper
          echo "═══ Testing full keeper import chain ═══"
          npx ts-node -e "
          console.log('Testing imports...');
          require('./src/core/signal-client'); console.log('✅ signal-client');
          require('./src/core/state-manager'); console.log('✅ state-manager');
          require('./src/core/rebalance-engine'); console.log('✅ rebalance-engine');
          require('./src/execution/drift-executor'); console.log('✅ drift-executor');
          require('./src/execution/vault-allocator'); console.log('✅ vault-allocator');
          require('./src/execution/jupiter-executor'); console.log('✅ jupiter-executor');
          require('./src/execution/emergency-unwind'); console.log('✅ emergency-unwind');
          require('./src/attestation/ai-attestation'); console.log('✅ ai-attestation');
          require('./src/attestation/attestation-verifier'); console.log('✅ attestation-verifier');
          require('./src/risk/risk-checker'); console.log('✅ risk-checker');
          require('./src/risk/position-tracker'); console.log('✅ position-tracker');
          require('./src/risk/drift-health-monitor'); console.log('✅ drift-health-monitor');
          require('./src/monitoring/logger'); console.log('✅ logger');
          require('./src/monitoring/metrics'); console.log('✅ metrics');
          require('./src/monitoring/alerter'); console.log('✅ alerter');
          require('./src/config'); console.log('✅ config');
          console.log('');
          console.log('═══ All 16 keeper modules import successfully ═══');
          " 2>&1

      # ═══ TEST 3: Vault Scripts Import Chain ═══
      - name: "Test: Vault Scripts Import Chain"
        run: |
          cd vault
          echo "═══ Testing vault script compilation ═══"
          npx ts-node -e "
          require('./src/helper'); console.log('✅ helper.ts');
          require('./src/constants/drift'); console.log('✅ constants/drift');
          require('./src/constants/kamino'); console.log('✅ constants/kamino');
          require('./src/constants/tokens'); console.log('✅ constants/tokens');
          require('./src/variables'); console.log('✅ variables.ts');
          require('./src/types'); console.log('✅ types.ts');
          console.log('');
          console.log('═══ All vault modules import successfully ═══');
          " 2>&1

      # ═══ TEST 4: Docker Compose Validation ═══
      - name: "Test: Docker Compose Config"
        run: |
          echo "═══ Docker Compose Config ═══"
          if [ -f "infra/docker/docker-compose.yml" ]; then
            cd infra/docker
            docker compose config > /dev/null 2>&1
            if [ $? -eq 0 ]; then
              echo "✅ docker-compose.yml is valid"
            else
              echo "❌ docker-compose.yml has errors"
              docker compose config
              exit 1
            fi
          else
            echo "⚠️ docker-compose.yml not found (optional)"
          fi
