# .github/workflows/ci-integration.yml
name: "Integration Tests"

on:
  workflow_call:
  workflow_dispatch:

jobs:
  cross-package:
    name: "Cross-Package Integration"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node 22
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install all dependencies
        run: |
          cd keeper && npm install && cd ..
          cd vault && npm install && cd ..

      # === TEST 1: Keeper Module Import Chain ===
      - name: "Test: Keeper Full Import Chain"
        env:
          KEEPER_SECRET: "test"
          SIGNAL_SERVER_URL: "http://localhost:8080"
          HELIUS_RPC_URL: "https://api.devnet.solana.com"
          DRY_RUN: "true"
        run: |
          cd keeper
          echo "=== Testing full keeper import chain ==="
          npx ts-node -e "
          console.log('Testing imports...');
          require('./src/core/signal-client'); console.log('[PASS] signal-client');
          require('./src/core/state-manager'); console.log('[PASS] state-manager');
          require('./src/core/rebalance-engine'); console.log('[PASS] rebalance-engine');
          require('./src/execution/drift-executor'); console.log('[PASS] drift-executor');
          require('./src/execution/vault-allocator'); console.log('[PASS] vault-allocator');
          require('./src/execution/jupiter-executor'); console.log('[PASS] jupiter-executor');
          require('./src/execution/emergency-unwind'); console.log('[PASS] emergency-unwind');
          require('./src/attestation/ai-attestation'); console.log('[PASS] ai-attestation');
          require('./src/attestation/attestation-verifier'); console.log('[PASS] attestation-verifier');
          require('./src/risk/risk-checker'); console.log('[PASS] risk-checker');
          require('./src/risk/position-tracker'); console.log('[PASS] position-tracker');
          require('./src/risk/zeta-health-monitor'); console.log('[PASS] zeta-health-monitor');
          require('./src/monitoring/logger'); console.log('[PASS] logger');
          require('./src/monitoring/metrics'); console.log('[PASS] metrics');
          require('./src/monitoring/alerter'); console.log('[PASS] alerter');
          require('./src/config'); console.log('[PASS] config');
          console.log('');
          console.log('=== All 16 keeper modules import successfully ===');
          " 2>&1

      # === TEST 2: Vault Scripts Import Chain ===
      - name: "Test: Vault Scripts Import Chain"
        run: |
          cd vault
          echo "=== Testing vault script compilation ==="
          npx ts-node -e "
          require('./src/helper'); console.log('[PASS] helper.ts');
          require('./src/constants/zeta'); console.log('[PASS] constants/zeta');
          require('./src/constants/kamino'); console.log('[PASS] constants/kamino');
          require('./src/constants/tokens'); console.log('[PASS] constants/tokens');
          require('./src/variables'); console.log('[PASS] variables.ts');
          require('./src/types'); console.log('[PASS] types.ts');
          console.log('');
          console.log('=== All vault modules import successfully ===');
          " 2>&1

      # === TEST 3: Docker Compose Validation ===
      - name: "Test: Docker Compose Config"
        run: |
          echo "=== Docker Compose Config ==="
          if [ -f "infra/docker/docker-compose.yml" ]; then
            cd infra/docker
            docker compose config > /dev/null 2>&1
            if [ $? -eq 0 ]; then
              echo "[PASS] docker-compose.yml is valid"
            else
              echo "[FAIL] docker-compose.yml has errors"
              docker compose config
              exit 1
            fi
          else
            echo "[WARN] docker-compose.yml not found (optional)"
          fi
