# ═══════════════════════════════════════════════════════════════
# Dependabot — Automated Dependency Updates
# ═══════════════════════════════════════════════════════════════
# Opens PRs automatically when dependency updates are available.
# Groups minor/patch updates to reduce PR noise.
# Critical DeFi SDKs are pinned and require manual review.

version: 2

registries:
  npm-registry:
    type: npm-registry
    url: https://registry.npmjs.org

updates:
  # ─── Keeper (TypeScript) ───
  - package-ecosystem: "npm"
    directory: "/keeper"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 10
    reviewers:
      - "Ashutosh0x"
    labels:
      - "dependencies"
      - "keeper"
    # Group non-critical updates into a single PR
    groups:
      minor-and-patch:
        update-types:
          - "minor"
          - "patch"
        exclude-patterns:
          - "@zetamarkets/*"
          - "@voltr/*"
          - "@coral-xyz/*"
          - "@drift-labs/*"
    # Critical DeFi SDKs: only security updates, manual review required
    ignore:
      - dependency-name: "@zetamarkets/sdk"
        update-types: ["version-update:semver-minor", "version-update:semver-patch"]
      - dependency-name: "@voltr/vault-sdk"
        update-types: ["version-update:semver-minor", "version-update:semver-patch"]
    commit-message:
      prefix: "chore(keeper):"

  # ─── Vault Scripts (TypeScript) ───
  - package-ecosystem: "npm"
    directory: "/vault"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 10
    reviewers:
      - "Ashutosh0x"
    labels:
      - "dependencies"
      - "vault"
    groups:
      minor-and-patch:
        update-types:
          - "minor"
          - "patch"
        exclude-patterns:
          - "@zetamarkets/*"
          - "@voltr/*"
          - "@coral-xyz/*"
    ignore:
      - dependency-name: "@zetamarkets/sdk"
        update-types: ["version-update:semver-minor", "version-update:semver-patch"]
      - dependency-name: "@voltr/vault-sdk"
        update-types: ["version-update:semver-minor", "version-update:semver-patch"]
    commit-message:
      prefix: "chore(vault):"

  # ─── Dashboard (Next.js) ───
  - package-ecosystem: "npm"
    directory: "/dashboard"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 10
    reviewers:
      - "Ashutosh0x"
    labels:
      - "dependencies"
      - "dashboard"
    groups:
      minor-and-patch:
        update-types:
          - "minor"
          - "patch"
    commit-message:
      prefix: "chore(dashboard):"

  # ─── Signal Engine (Rust) ───
  - package-ecosystem: "cargo"
    directory: "/signal-engine-rs"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 5
    reviewers:
      - "Ashutosh0x"
    labels:
      - "dependencies"
      - "signal-engine"
    groups:
      minor-and-patch:
        update-types:
          - "minor"
          - "patch"
    commit-message:
      prefix: "chore(signal):"

  # ─── GitHub Actions ───
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 5
    reviewers:
      - "Ashutosh0x"
    labels:
      - "dependencies"
      - "ci"
    commit-message:
      prefix: "chore(ci):"

  # ─── Docker ───
  - package-ecosystem: "docker"
    directory: "/keeper"
    schedule:
      interval: "monthly"
    labels:
      - "dependencies"
      - "docker"
    commit-message:
      prefix: "chore(docker):"

  - package-ecosystem: "docker"
    directory: "/signal-engine-rs"
    schedule:
      interval: "monthly"
    labels:
      - "dependencies"
      - "docker"
    commit-message:
      prefix: "chore(docker):"

  - package-ecosystem: "docker"
    directory: "/dashboard"
    schedule:
      interval: "monthly"
    labels:
      - "dependencies"
      - "docker"
    commit-message:
      prefix: "chore(docker):"
