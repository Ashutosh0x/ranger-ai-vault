version: "3.8"

# M7: Build contexts point to project root with correct Dockerfile paths
# All contexts use ../../ (relative to infra/docker/) which resolves to project root
services:
  signal-engine:
    build:
      context: ../../signal-engine-rs
      dockerfile: Dockerfile.prod
    ports:
      - "8080:8080"
    env_file:
      - ../../.env
    environment:
      - KEEPER_SECRET=${KEEPER_SECRET}
      - SIGNAL_SERVER_PORT=8080
      - SOLANA_CLUSTER=${SOLANA_CLUSTER:-devnet}
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  keeper:
    build:
      context: ../../keeper
      dockerfile: Dockerfile.prod
    env_file:
      - ../../.env
    environment:
      - SIGNAL_SERVER_URL=http://signal-engine:8080
      - KEEPER_SECRET=${KEEPER_SECRET}
      - HELIUS_RPC_URL=${HELIUS_RPC_URL}
      - SOLANA_CLUSTER=${SOLANA_CLUSTER:-devnet}
    volumes:
      - ../../keeper/keys:/app/keys:ro
      - ../../vault/keys:/app/vault-keys:ro
    depends_on:
      signal-engine:
        condition: service_healthy
    restart: unless-stopped

  dashboard:
    build:
      context: ../../dashboard
      dockerfile: Dockerfile.prod
    ports:
      - "3000:3000"
    env_file:
      - ../../.env
    environment:
      - NEXT_PUBLIC_SIGNAL_URL=http://localhost:8080
      - HELIUS_RPC_URL=${HELIUS_RPC_URL}
      - VAULT_ADDRESS=${VAULT_ADDRESS}
    depends_on:
      - signal-engine
    restart: unless-stopped
